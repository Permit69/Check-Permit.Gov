<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Permit Verification Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f39c12; margin: 0; color: white; text-align: center; }
        header { background-color: #7e5109; padding: 20px; font-size: 24px; font-weight: bold; }
        .main-title { padding: 30px; font-size: 22px; text-transform: uppercase; }

        /* Country Grid */
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .country-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            color: black;
        }

        .country-card:hover { transform: scale(1.1); background: #eee; }
        .country-card img { width: 100%; border-radius: 4px; }
        .country-card p { margin: 5px 0 0; font-size: 12px; font-weight: bold; }

        /* Verification Popup/Section */
        #verify-section {
            display: none; /* Prothome lukiye thakbe */
            background: white;
            color: black;
            padding: 30px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 1001;
            width: 300px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }

        input { padding: 10px; width: 90%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .close-btn { background: #e74c3c; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <header>🌐 WORK PERMIT VERIFICATION</header>
    <div class="main-title">Select Country to Verify Offer Letter</div>

    <div class="country-grid" id="grid">
        </div>

    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div id="verify-section">
        <h3 id="countryName">Country</h3>
        <p>Enter Reference/Permit Code:</p>
        <input type="text" id="permitCode" placeholder="Enter Code Here">
        <br>
        <button onclick="checkCode()">VIEW PDF PERMIT</button>
        <br>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>

    <script>
        // 50+ Desher List (Apni icche moto aro barate paren)
        const countries = [
            {n: "USA", c: "us"}, {n: "Canada", c: "ca"}, {n: "UK", c: "gb"}, {n: "Cyprus", c: "cy"},
            {n: "Malaysia", c: "my"}, {n: "Saudi Arabia", c: "sa"}, {n: "UAE", c: "ae"}, {n: "Qatar", c: "qa"},
            {n: "Oman", c: "om"}, {n: "Singapore", c: "sg"}, {n: "Italy", c: "it"}, {n: "Romania", c: "ro"},
            {n: "Portugal", c: "pt"}, {n: "Malta", c: "mt"}, {n: "Poland", c: "pl"}, {n: "Croatia", c: "hr"},
            {n: "France", c: "fr"}, {n: "Germany", c: "de"}, {n: "Kuwait", c: "kw"}, {n: "Bahrain", c: "bh"},
            {n: "South Korea", c: "kr"}, {n: "Japan", c: "jp"}, {n: "Maldives", c: "mv"}, {n: "Jordan", c: "jo"},
            {n: "Russia", c: "ru"}, {n: "Australia", c: "au"}, {n: "New Zealand", c: "nz"}, {n: "Ireland", c: "ie"},
            {n: "Sweden", c: "se"}, {n: "Finland", c: "fi"}, {n: "Norway", c: "no"}, {n: "Switzerland", c: "ch"},
            {n: "Denmark", c: "dk"}, {n: "Belgium", c: "be"}, {n: "Netherlands", c: "nl"}, {n: "Spain", c: "es"},
            {n: "Greece", c: "gr"}, {n: "Turkey", c: "tr"}, {n: "Hungary", c: "hu"}, {n: "Austria", c: "at"},
            {n: "Egypt", c: "eg"}, {n: "Thailand", c: "th"}, {n: "Vietnam", c: "vn"}, {n: "Brazil", c: "br"},
            {n: "Mexico", c: "mx"}, {n: "South Africa", c: "za"}, {n: "Mauritius", c: "mu"}, {n: "Brunei", c: "bn"}
        ];

        const grid = document.getElementById('grid');
        let selectedCountry = "";

        // Flags generate kora
        countries.forEach(country => {
            const card = document.createElement('div');
            card.className = 'country-card';
            card.onclick = () => openPopup(country.n);
            card.innerHTML = `<img src="https://flagcdn.com/w160/${country.c}.png"><p>${country.n}</p>`;
            grid.appendChild(card);
        });

        function openPopup(name) {
            selectedCountry = name;
            document.getElementById('countryName').innerText = name;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('verify-section').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('permitCode').value = "";
        }

        function checkCode() {
            const code = document.getElementById('permitCode').value.trim();
            
            // CODE Lojic: Ekhane apni PDF link boshaben
            if(code === "123456") {
                // Jodi code thik hoy, tobe PDF open hobe
                window.open("apnar-file-link.pdf", "_blank"); 
            } else if(code === "786786") {
                window.open("onno-ekta-file.pdf", "_blank");
            } else {
                alert("Invalid Code! Please try again.");
            }
        }
    </script>
</body>
</html>
